name: Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://line-order-bot-7qjc.onrender.com
          echo " - Pinged at $(date '+%Y-%m-%d %H:%M:%S')"
